name: Drokpo
options:
  bundleIdPrefix: app.drokpo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  Drokpo:
    type: application
    platform: iOS
    sources:
      - Drokpo
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.drokpo.ios
        # Must stay >= the version of the manually-uploaded build 1, which
        # shipped as literal "1.0" (the old Info.plist ignored this setting) —
        # TestFlight won't offer a lower version string as an update, and the
        # App Store version record is "1.0".
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: W66Z24ZPWQ
        OTHER_LDFLAGS: "-ObjC"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # REVERSED_CLIENT_ID from GoogleService-Info.plist, used as the Google sign-in redirect URL scheme.
        GOOGLE_REVERSED_CLIENT_ID: com.googleusercontent.apps.246225694981-ern5vh2rgijmht2bkubvbg232mlkfnpp
    info:
      path: Drokpo/Info.plist
      properties:
        # Without these, XcodeGen writes literal defaults ("1.0"/"1") into the
        # plist and CI's CURRENT_PROJECT_VERSION override never reaches the
        # binary — TestFlight then rejects the upload as a duplicate build.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "Drokpo uses your location to show you people nearby."
        NSPhotoLibraryUsageDescription: "Drokpo needs access to your photos so you can add them to your profile."
        CFBundleDisplayName: Drokpo
        # Only standard HTTPS/TLS — exempt from export compliance, so
        # TestFlight doesn't ask the encryption question on every build.
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)
    entitlements:
      path: Drokpo/Drokpo.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        # Push notifications for new matches/messages (backend Cloud Functions
        # send via FCM). Xcode maps this to "production" in distribution builds.
        aps-environment: development
