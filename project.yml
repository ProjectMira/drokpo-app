name: Changsa
options:
  bundleIdPrefix: app.changsa
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  Changsa:
    type: application
    platform: iOS
    sources:
      - Changsa
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseStorage
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.changsa.ios
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: W66Z24ZPWQ
        OTHER_LDFLAGS: "-ObjC"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # REVERSED_CLIENT_ID from GoogleService-Info.plist, used as the Google sign-in redirect URL scheme.
        GOOGLE_REVERSED_CLIENT_ID: com.googleusercontent.apps.105130875319-vmti5vuqsks8v26505fgms8t0r716de6
    info:
      path: Changsa/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "Changsa uses your location to show you people nearby."
        NSPhotoLibraryUsageDescription: "Changsa needs access to your photos so you can add them to your profile."
        CFBundleDisplayName: Changsa
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)
    entitlements:
      path: Changsa/Changsa.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
