name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required repo secrets:
#   ASC_API_KEY_P8            — contents of AuthKey_D3D26YHSP9.p8 (Admin role, for cloud signing)
#   GOOGLE_SERVICE_INFO_PLIST — contents of Drokpo/Resources/GoogleService-Info.plist
env:
  ASC_KEY_ID: D3D26YHSP9
  ASC_ISSUER_ID: 740fa955-2ad0-4d4c-a447-c67f9c446977
  # Build 1 was uploaded manually before CI existed, so CI numbering starts at
  # run_number + 1. Raise this offset if the workflow is ever recreated and
  # run_number resets below a build number already used on App Store Connect.
  BUILD_NUMBER_OFFSET: 1

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: write # pushes the version tag after a successful upload
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Restore secrets
        run: |
          # GoogleService-Info.plist has the same secret-mangling hazards as the
          # .p8: a base64-wrapped value, literal "\n"/"\r" escape sequences, or
          # CRLF endings all yield a file Xcode can't read ("PropertyListConversion
          # error"). Normalise, then lint before the build depends on it.
          plist="$GOOGLE_SERVICE_INFO_PLIST"
          if ! printf '%s' "$plist" | grep -q '<plist'; then
            decoded="$(printf '%s' "$plist" | tr -d '[:space:]' | openssl base64 -d -A 2>/dev/null || true)"
            printf '%s' "$decoded" | grep -q '<plist' && plist="$decoded"
          fi
          printf '%s' "$plist" | sed -e 's/\\r//g' -e 's/\\n//g' | tr -d '\r' > Drokpo/Resources/GoogleService-Info.plist
          if ! plutil -lint Drokpo/Resources/GoogleService-Info.plist >/dev/null 2>&1; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST is not a valid property list after normalisation. Re-add it with the exact file bytes:  gh secret set GOOGLE_SERVICE_INFO_PLIST --repo ProjectMira/drokpo-app < Drokpo/Resources/GoogleService-Info.plist"
            exit 1
          fi

          mkdir -p ~/private_keys
          KEY_PATH=~/private_keys/AuthKey_${ASC_KEY_ID}.p8

          # xcodebuild feeds the .p8 straight to CryptoKit, which rejects
          # anything that isn't a pristine PEM with "invalidPEMDocument" —
          # CRLF endings, collapsed/flattened newlines, a missing trailing
          # newline, literal "\n" escape sequences, or a base64-wrapped secret
          # all trip it. Normalise whatever form the secret is stored in into a
          # canonical PEM.
          raw="$ASC_API_KEY_P8"
          # Delete literal "\n"/"\r" escape sequences (secrets saved from a .env
          # or JSON-escaped CLI value store newlines this way) and carriage
          # returns. Deleting rather than converting keeps this portable across
          # BSD/GNU sed; the base64 body is rebuilt from scratch below anyway.
          raw="$(printf '%s' "$raw" | sed -e 's/\\r//g' -e 's/\\n//g' | tr -d '\r')"
          if ! printf '%s' "$raw" | grep -q 'BEGIN PRIVATE KEY'; then
            # No PEM markers — assume the secret is a base64-encoded .p8 file.
            raw="$(printf '%s' "$raw" | tr -d '[:space:]' | openssl base64 -d -A 2>/dev/null || true)"
          fi
          body="$(printf '%s' "$raw" \
            | sed -e 's/-----BEGIN PRIVATE KEY-----//' -e 's/-----END PRIVATE KEY-----//' \
            | tr -d '[:space:]')"
          {
            echo '-----BEGIN PRIVATE KEY-----'
            printf '%s\n' "$body" | fold -w 64
            echo '-----END PRIVATE KEY-----'
          } > "$KEY_PATH"

          # Fail early with a clear message if the result still isn't a usable
          # key, instead of a cryptic CryptoKit error deep in the archive step.
          if ! openssl pkey -in "$KEY_PATH" -noout 2>/dev/null; then
            # Non-sensitive diagnostics (lengths only, never key material) to
            # tell an empty/wrong secret apart from a formatting problem.
            echo "::error::ASC_API_KEY_P8 could not be normalised into a valid App Store Connect .p8 key."
            echo "Diagnostics: raw secret is ${#ASC_API_KEY_P8} chars; extracted base64 body is ${#body} chars (a valid P-256 .p8 body is ~200)."
            if printf '%s' "$ASC_API_KEY_P8" | grep -q 'BEGIN PRIVATE KEY'; then
              echo "PEM markers were present, so the base64 body itself is malformed or truncated."
            else
              echo "No PEM markers found in the secret, and it did not base64-decode to a key."
            fi
            echo "Fix: re-add the secret as the exact, unmodified contents of AuthKey_${ASC_KEY_ID}.p8 — e.g.  gh secret set ASC_API_KEY_P8 < AuthKey_${ASC_KEY_ID}.p8"
            exit 1
          fi
          echo "App Store Connect key normalised and validated."
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}

      - name: Compute version and build number
        id: version
        run: |
          MARKETING_VERSION=$(sed -n 's/^ *MARKETING_VERSION: *"\(.*\)"/\1/p' project.yml)
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER + BUILD_NUMBER_OFFSET))
          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version $MARKETING_VERSION ($BUILD_NUMBER)"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild \
            -project Drokpo.xcodeproj \
            -scheme Drokpo \
            -destination 'generic/platform=iOS' \
            -archivePath build/Drokpo.xcarchive \
            CURRENT_PROJECT_VERSION=${{ steps.version.outputs.build_number }} \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Drokpo.xcarchive \
            -exportOptionsPlist ci/exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Tag release
        run: |
          TAG="v${{ steps.version.outputs.marketing_version }}-build.${{ steps.version.outputs.build_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "TestFlight build ${{ steps.version.outputs.build_number }}"
          git push origin "$TAG"
